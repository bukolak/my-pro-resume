name: My first pipeline
on:
    push: 
        branches: ["main"]
jobs:
    build:
        runs-on: ubuntu-latest # macos, windows-latest
        steps:
            - name: Clone the code
              uses: actions/checkout@v4
            - name: Build image
              run:
                docker build -t bukolak/cicd-portfolio .
            - name: Docker login
              uses: docker/login-action@v3
              with:
                username: bukolak
                password: ${{ secrets.DOCKER_PASS }}
                environment:
                 ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true
            - name: Push image
              run:
                docker push bukolak/cicd-portfolio